</div>

<script>
// ═══════════════════════════════════════════════
// CONFIG
// ═══════════════════════════════════════════════
const ANTHROPIC_API_URL = "https://api.anthropic.com/v1/messages";
const MODEL = "claude-sonnet-4-20250514";

// ═══════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════
let micGranted     = false;
let isListening    = false;
let recognition    = null;
let fullOriginal   = "";
let fullTranslated = "";
let aiQueue        = [];
let isAiProcessing = false;
let silenceTimer   = null;
let batchBuffer    = [];
let restartTimer   = null;

// ═══════════════════════════════════════════════
// MIC PERMISSION
// ═══════════════════════════════════════════════
async function requestMicPermission() {
    const btn   = document.getElementById('mic-btn');
    const icon  = document.getElementById('mic-icon');
    const lbl   = document.getElementById('mic-label');
    const desc  = document.getElementById('mic-desc');
    const badge = document.getElementById('mic-badge');

    btn.disabled     = true;
    btn.textContent  = '요청 중...';
    icon.textContent = '⏳';

    try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        stream.getTracks().forEach(t => t.stop()); // Release immediately

        micGranted = true;
        icon.textContent  = '✅';
        lbl.textContent   = '마이크 허용됨';
        desc.textContent  = '마이크 접근이 허용되었습니다. 청취를 시작할 수 있습니다.';
        badge.textContent = '🎤 마이크 허용됨';
        badge.className   = 'badge badge-green';
        btn.textContent   = '✓ 허용됨';
        btn.style.background = '#1a7a4a';
        setStatus('마이크 권한 확인 완료. 청취 시작 버튼을 눌러주세요.');
        document.getElementById('toggle-btn').disabled = false;
        initRecognition();
    } catch (err) {
        icon.textContent  = '❌';
        lbl.textContent   = '권한 거부됨';
        desc.textContent  = '브라우저 설정에서 마이크 권한을 허용한 뒤 다시 시도해주세요.';
        badge.textContent = '🎤 권한 거부됨';
        badge.className   = 'badge badge-red';
        btn.textContent   = '다시 시도';
        btn.disabled      = false;
        setStatus('마이크 권한이 거부되었습니다. 브라우저 주소창의 🔒 아이콘을 눌러 허용해주세요.');
    }
}

// ═══════════════════════════════════════════════
// SPEECH RECOGNITION
// ═══════════════════════════════════════════════
function getLang() {
    const v = document.getElementById('lang-select').value;
    // For auto mode, use broad English as base — AI will handle actual language
    if (v === 'auto') return 'en-US';
    return v;
}

function initRecognition() {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) {
        setStatus('❌ 이 브라우저는 음성인식을 지원하지 않습니다. Chrome을 사용해주세요.');
        return;
    }

    recognition = new SR();
    recognition.continuous     = true;
    recognition.interimResults = true;
    recognition.maxAlternatives = 1;
    recognition.lang           = getLang();

    recognition.onstart = onRecognitionStart;
    recognition.onend   = onRecognitionEnd;
    recognition.onerror = onRecognitionError;
    recognition.onresult = onRecognitionResult;
}

function onRecognitionStart() {
    isListening = true;
    document.getElementById('toggle-btn').textContent  = '⏹ 청취 중지';
    document.getElementById('toggle-btn').className    = 'btn btn-danger btn-full';
    document.getElementById('listen-badge').textContent = '🟢 청취 중';
    document.getElementById('listen-badge').className   = 'badge badge-green';
    setStatus('실시간 분석 중 — 말소리를 감지하고 있습니다');
}

function onRecognitionEnd() {
    if (!isListening) {
        document.getElementById('toggle-btn').textContent = '🎤 대화 청취 시작';
        document.getElementById('toggle-btn').className   = 'btn btn-success btn-full';
        document.getElementById('listen-badge').textContent = '🔴 중지됨';
        document.getElementById('listen-badge').className   = 'badge badge-red';
        setStatus('청취가 중지되었습니다');
        return;
    }
    const continuous = document.getElementById('opt-continuous').checked;
    if (continuous) {
        // Restart immediately to avoid gaps
        clearTimeout(restartTimer);
        restartTimer = setTimeout(() => {
            if (!isListening) return;
            try {
                recognition.lang = getLang();
                recognition.start();
            } catch(e) {}
        }, 100);
    }
}

function onRecognitionError(e) {
    if (['no-speech', 'aborted', 'audio-capture'].includes(e.error)) return;
    setStatus(`음성인식 오류: ${e.error}`);
    // Auto-restart on error if still supposed to be listening
    if (isListening) {
        clearTimeout(restartTimer);
        restartTimer = setTimeout(() => {
            if (!isListening) return;
            try { recognition.start(); } catch(e2) {}
        }, 500);
    }
}

function onRecognitionResult(event) {
    let interim = '';
    for (let i = event.resultIndex; i < event.results.length; ++i) {
        const res  = event.results[i];
        const text = res[0].transcript.trim();
        if (!text) continue;

        if (res.isFinal) {
            fullOriginal += text + '\n';
            renderTranscript();
            batchBuffer.push(text);
            scheduleBatchProcess();

            // Also do quick translation for non-auto languages
            const lv = document.getElementById('lang-select').value;
            if (lv !== 'auto') {
                quickTranslate(text, lv);
            }
        } else {
            interim = text;
        }
    }
    renderTranscript(interim);
}

function renderTranscript(interim = '') {
    const el = document.getElementById('transcript');
    let html = esc(fullOriginal);
    if (interim) html += `<span class="interim">${esc(interim)}...</span>`;
    el.innerHTML = html;
    el.scrollTop = el.scrollHeight;
}

// ═══════════════════════════════════════════════
// TOGGLE
// ═══════════════════════════════════════════════
function toggleListening() {
    if (!micGranted) return;
    if (!isListening) {
        if (!recognition) initRecognition();
        recognition.lang = getLang();
        isListening = true;
        try { recognition.start(); } catch(e) {}
    } else {
        isListening = false;
        clearTimeout(restartTimer);
        try { recognition.stop(); } catch(e) {}
    }
}

// ═══════════════════════════════════════════════
// QUICK TRANSLATION (MyMemory — Bengali fixed)
// ═══════════════════════════════════════════════
const LANG_MAP = {
    'bn-BD': 'bn', 'ar-SA': 'ar', 'ur-PK': 'ur',
    'tr-TR': 'tr', 'en-US': 'en', 'zh-CN': 'zh',
    'ja-JP': 'ja', 'hi-IN': 'hi',
};

async function quickTranslate(text, langCode) {
    const src = LANG_MAP[langCode] || langCode.split('-')[0];
    const url = `https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=${src}|ko`;
    try {
        const res  = await fetch(url);
        const data = await res.json();
        const t    = data.responseData?.translatedText;
        if (t && !t.includes('MYMEMORY WARNING') && t !== text) {
            fullTranslated += t + '\n';
        } else {
            fullTranslated += `[번역중...]\n`;
        }
    } catch(e) {
        fullTranslated += '[네트워크오류]\n';
    }
    const el = document.getElementById('translated');
    el.textContent = fullTranslated;
    el.scrollTop   = el.scrollHeight;
}

// ═══════════════════════════════════════════════
// AI BATCH PROCESSING
// ═══════════════════════════════════════════════
function scheduleBatchProcess() {
    clearTimeout(silenceTimer);
    silenceTimer = setTimeout(() => {
        if (batchBuffer.length > 0) {
            const batch = batchBuffer.splice(0);
            runAiAnalysis(batch);
        }
    }, 3000); // Send to AI after 3s of no new finals
}

async function runAiAnalysis(segments) {
    if (!segments.length) return;
    setAiProcessing(true);

    const lv       = document.getElementById('lang-select').value;
    const optMulti = document.getElementById('opt-multispeaker').checked;
    const optInfer = document.getElementById('opt-infer').checked;
    const rawText  = segments.join('\n');

    const system = `당신은 실시간 다국어 대화 분석 전문가입니다. 음성인식된 텍스트를 분석하여 다음 작업을 수행하세요:

1. 언어 자동 감지 (벵골어, 아랍어, 영어, 터키어, 우르두어, 한국어 등)
2. 다화자 구분: 언어 변화, 문맥, 말투로 화자를 추정 (화자A, 화자B, 화자C)
3. 비문 보완: 음성인식 오류나 불완전 문장을 문맥으로 추론해 완성 (inferred: true 표시)
4. 한국어 번역: 자연스러운 한국어로 번역

반드시 아래 JSON 형식으로만 응답하세요 (다른 텍스트, 마크다운 없이):
{"detected_language":"언어명","turns":[{"speaker":"화자A","original":"보완된 원문","inferred":false,"korean":"한국어 번역"}],"summary":"한 줄 요약"}`;

    const user = `음성인식 텍스트:\n${rawText}`;

    try {
        const res  = await fetch(ANTHROPIC_API_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                model: MODEL,
                max_tokens: 1000,
                system,
                messages: [{ role: 'user', content: user }]
            })
        });
        const data = await res.json();
        const text = data.content?.map(c => c.text || '').join('') || '';
        const m    = text.match(/\{[\s\S]*\}/);
        if (m) {
            const parsed = JSON.parse(m[0]);
            renderAiResult(parsed, optMulti, optInfer);
            // Auto mode: use AI for translation too
            if (lv === 'auto' && parsed.turns) {
                const lines = parsed.turns.map(t => t.korean).filter(Boolean).join('\n');
                if (lines) {
                    fullTranslated += lines + '\n';
                    const el = document.getElementById('translated');
                    el.textContent = fullTranslated;
                    el.scrollTop   = el.scrollHeight;
                }
            }
        } else {
            appendAiRaw(text);
        }
    } catch(err) {
        appendAiRaw(`[AI 오류] ${err.message}`);
    }

    setAiProcessing(false);
}

// ═══════════════════════════════════════════════
// RENDER AI RESULT
// ═══════════════════════════════════════════════
const TAG_CLASS = { '화자A': 'tag-a', '화자B': 'tag-b', '화자C': 'tag-c' };

function renderAiResult(parsed, showMulti, showInfer) {
    const el = document.getElementById('ai-output');
    let html = '';

    if (parsed.detected_language) {
        html += `<div style="font-size:11px;color:#7a8eaahttps://book4241-cloud.github.io/Puppy-papa/;margin-bottom:8px;">🔍 감지 언어: <strong style="color:#fbbf24">${esc(parsed.detected_language)}</strong></div>`;
    }

    (parsed.turns || []).forEach(turn => {
        const spk = turn.speaker || '화자A';
        const tc  = TAG_CLASS[spk] || 'tag-a';
        html += `<div style="margin-bottom:10px;">`;
        if (showMulti) html += `<span class="speaker-tag ${tc}">${esc(spk)}</span>`;
        if (turn.inferred && showInfer) html += `<span class="speaker-tag tag-inferred">🔮 추론</span>`;
        html += `<br><span style="color:#c8d8ee;">${esc(turn.original || '')}</span>`;
        html += `<br><span style="color:#86efac;font-size:13px;">→ ${esc(turn.korean || '')}</span>`;
        html += `</div>`;
    });

    if (parsed.summary) {
        html += `<div style="margin-top:8px;padding-top:8px;border-top:1px solid #2e3a52;font-size:12px;color:#7a8eaa;">📋 요약: <span style="color:#fbbf24">${esc(parsed.summary)}</span></div>`;
    }

    el.innerHTML += html;
    el.scrollTop  = el.scrollHeight;
    document.getElementById('ai-badge').textContent = '🤖 분석 완료';
    document.getElementById('ai-badge').className   = 'badge badge-green';
}

function appendAiRaw(text) {
    const el = document.getElementById('ai-output');
    el.textContent += text + '\n';
    el.scrollTop = el.scrollHeight;
}

function setAiProcessing(on) {
    document.getElementById('ai-processing').style.display = on ? 'flex' : 'none';
    if (on) {
        document.getElementById('ai-badge').textContent = '🤖 분석 중...';
        document.getElementById('ai-badge').className   = 'badge badge-amber';
    }
}

// ═══════════════════════════════════════════════
// UTILS
// ═══════════════════════════════════════════════
function setStatus(msg) { document.getElementById('status-detail').textContent = msg; }

function esc(s) {
    if (!s) return '';
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function clearAll() {
    fullOriginal = ''; fullTranslated = ''; batchBuffer = []; aiQueue = [];
    document.getElementById('transcript').innerHTML   = '';
    document.getElementById('translated').textContent = '';
    document.getElementById('ai-output').innerHTML    = '';
    document.getElementById('ai-badge').textContent   = '🤖 AI 대기 중';
    document.getElementById('ai-badge').className     = 'badge badge-blue';
}

function copyText(id) {
    const el = document.getElementById(id);
    const t  = (el.innerText || el.textContent).trim();
    if (!t) return;
    navigator.clipboard.writeText(t).then(() => alert('복사되었습니다.')).catch(() => alert('복사 실패'));
}

// ═══════════════════════════════════════════════
// AUTO-DETECT EXISTING MIC PERMISSION ON LOAD
// ═══════════════════════════════════════════════
(async () => {
    try {
        const perm = await navigator.permissions.query({ name: 'microphone' });
        if (perm.state === 'granted') {
            micGranted = true;
            document.getElementById('mic-icon').textContent  = '✅';
            document.getElementById('mic-label').textContent = '마이크 이미 허용됨';
            document.getElementById('mic-desc').textContent  = '이전에 허용된 마이크 권한이 유효합니다';
            document.getElementById('mic-badge').textContent = '🎤 마이크 허용됨';
            document.getElementById('mic-badge').className   = 'badge badge-green';
            const btn = document.getElementById('mic-btn');
            btn.textContent   = '✓ 허용됨';
            btn.style.background = '#1a7a4a';
            document.getElementById('toggle-btn').disabled   = false;
            setStatus('마이크 허용됨. 청취 시작 버튼을 눌러주세요.');
            initRecognition();
        }
    } catch(e) { /* permissions API not supported */ }
})();
</script>
