<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ralph's Real-time Translator</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f7f6; padding: 20px; color: #333; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); position: relative; }
        select, button.main-btn { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #ddd; font-size: 16px; }
        button.main-btn { background: #004a99; color: white; border: none; font-weight: bold; cursor: pointer; }
        button.main-btn:active { background: #003366; }
        .header-box { display: flex; justify-content: space-between; align-items: center; margin-top: 15px; }
        .copy-btn { padding: 5px 10px; font-size: 12px; background: #28a745; color: white; border: none; border-radius: 4px; cursor: pointer; }
        .display { min-height: 100px; padding: 15px; background: #f9f9f9; border-left: 5px solid #004a99; margin-bottom: 20px; white-space: pre-wrap; word-break: break-all; }
        .status { font-size: 14px; text-align: center; margin-bottom: 10px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h2>실시간 대화 번역기</h2>
        <div id="status" class="status" style="color: #d9534f;">🔴 중지됨 (HTTPS 환경 필요)</div>
        
        <label for="lang-select">상대방 언어 설정:</label>
        <select id="lang-select">
            <option value="en-US">영어 (English)</option>
            <option value="bn-BD">벵골어 (Bangladesh)</option>
            <option value="ar-SA">아랍어 (Saudi Arabia)</option>
            <option value="ur-PK">우르두어 (Pakistan)</option>
            <option value="tr-TR">터키어 (Turkey)</option>
        </select>

        <button id="toggle-btn" class="main-btn">대화 청취 시작</button>

        <div class="header-box">
            <h3>들리는 내용 (원문):</h3>
            <button class="copy-btn" onclick="copyText('transcript')">원문 복사</button>
        </div>
        <div id="transcript" class="display"></div>

        <div class="header-box">
            <h3>한국어 번역 결과:</h3>
            <button class="copy-btn" onclick="copyText('translated')">번역본 복사</button>
        </div>
        <div id="translated" class="display" style="background-color: #eef7ff;"></div>
    </div>

    <script>
        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        const startBtn = document.getElementById('toggle-btn');
        const langSelect = document.getElementById('lang-select');
        const statusDisp = document.getElementById('status');
        
        let isListening = false;
        let fullOriginalText = "";
        let fullTranslatedText = "";

        recognition.continuous = true;
        recognition.interimResults = true;

        startBtn.onclick = () => {
            if (!isListening) {
                recognition.lang = langSelect.value;
                try { recognition.start(); } catch (e) { console.log("이미 실행 중입니다."); }
            } else {
                isListening = false;
                recognition.stop();
            }
        };

        recognition.onstart = () => {
            isListening = true;
            startBtn.innerText = "대화 청취 중지";
            startBtn.style.background = "#d9534f";
            statusDisp.innerText = "🟢 실시간 분석 중... (끊김 방지 가동)";
            statusDisp.style.color = "#5cb85c";
        };

        recognition.onend = () => {
            if (isListening) { recognition.start(); } 
            else {
                startBtn.innerText = "대화 청취 시작";
                startBtn.style.background = "#004a99";
                statusDisp.innerText = "🔴 중지됨";
                statusDisp.style.color = "#d9534f";
            }
        };

        recognition.onresult = (event) => {
            let interimText = '';
            for (let i = event.resultIndex; i < event.results.length; ++i) {
                const text = event.results[i][0].transcript;
                if (event.results[i].isFinal) {
                    fullOriginalText += text + " ";
                    document.getElementById('transcript').innerText = fullOriginalText;
                    translateText(text, langSelect.value);
                } else {
                    interimText += text;
                    document.getElementById('transcript').innerText = fullOriginalText + interimText;
                }
            }
        };

        async function translateText(text, langCode) {
            const srcLang = langCode.split('-')[0]; // ex) bn-BD -> bn
            const url = `https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=${srcLang}|ko`;
            
            try {
                const response = await fetch(url);
                const data = await response.json();
                if (data.responseData && data.responseData.translatedText) {
                    fullTranslatedText += data.responseData.translatedText + " ";
                } else {
                    fullTranslatedText += "[번역불가] ";
                }
                document.getElementById('translated').innerText = fullTranslatedText;
            } catch (error) {
                fullTranslatedText += "[네트워크오류] ";
                document.getElementById('translated').innerText = fullTranslatedText;
            }
        }

        function copyText(elementId) {
            const textToCopy = document.getElementById(elementId).innerText;
            if(!textToCopy) return;
            navigator.clipboard.writeText(textToCopy).then(() => {
                alert("복사되었습니다.");
            }).catch(err => {
                alert("복사에 실패했습니다: " + err);
            });
        }
    </script>
</body>
</html>
